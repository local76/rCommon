[package]
name = "rcommon"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
winreg = "0.56.0"
sysinfo = "0.30"
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_Console",
    "Win32_System_Power",
    "Win32_System_Shutdown",
    "Win32_UI_Accessibility",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Graphics_Gdi",
    "Win32_UI_HiDpi",
    "Win32_System_Threading",
    "Win32_System_EventLog",
] }
windows = { version = "0.52.0", features = [
    "Data_Xml_Dom",
    "UI_Notifications",
] }
